name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          Copy-Item src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi release-artifacts/ -ErrorAction SilentlyContinue
          Copy-Item src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe release-artifacts/ -ErrorAction SilentlyContinue

      - name: Collect Linux artifacts
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null || true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/

  build-flatpak:
    needs: build-and-release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-x86_64-unknown-linux-gnu
          path: release-artifacts/

      - name: Extract binary from deb and copy icons
        run: |
          mkdir -p deb-extract
          dpkg-deb -x release-artifacts/*.deb deb-extract/
          find deb-extract -type f -name 'deck-save' -o -name 'DeckSave' | head -1 | xargs -I{} cp {} flatpak/deck-save
          chmod +x flatpak/deck-save
          ls -la flatpak/deck-save
          cp src-tauri/icons/32x32.png flatpak/32x32.png
          cp src-tauri/icons/64x64.png flatpak/64x64.png
          cp src-tauri/icons/128x128.png flatpak/128x128.png

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Build Flatpak
        run: |
          cd flatpak
          flatpak-builder --force-clean --repo=repo builddir com.baldknobber.decksave.yml
          flatpak build-bundle repo DeckSave.flatpak com.baldknobber.decksave

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-flatpak
          path: flatpak/DeckSave.flatpak

  publish:
    needs: [build-and-release, build-flatpak]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
