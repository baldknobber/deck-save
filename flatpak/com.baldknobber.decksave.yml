id: com.baldknobber.decksave
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: deck-save
appstream-compose: false

finish-args:
  # Display
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # Network (Syncthing sync)
  - --share=network
  # Home directory (game saves, backups)
  - --filesystem=home
  # SD card (Steam Deck external storage)
  - --filesystem=/run/media:ro
  # Steam directories (game detection)
  - --filesystem=~/.steam:ro
  - --filesystem=~/.local/share/Steam:ro
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # System tray
  - --talk-name=org.kde.StatusNotifierWatcher
  # WebKitGTK EGL workaround for AMD APUs
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1

modules:
  - name: deck-save
    buildsystem: simple
    build-commands:
      - install -Dm755 deck-save /app/bin/deck-save
      - install -Dm644 com.baldknobber.decksave.desktop /app/share/applications/com.baldknobber.decksave.desktop
      - install -Dm644 com.baldknobber.decksave.metainfo.xml /app/share/metainfo/com.baldknobber.decksave.metainfo.xml
      - install -Dm644 32x32.png /app/share/icons/hicolor/32x32/apps/com.baldknobber.decksave.png
      - install -Dm644 64x64.png /app/share/icons/hicolor/64x64/apps/com.baldknobber.decksave.png
      - install -Dm644 128x128.png /app/share/icons/hicolor/128x128/apps/com.baldknobber.decksave.png
    sources:
      - type: file
        path: deck-save
      - type: file
        path: com.baldknobber.decksave.desktop
      - type: file
        path: com.baldknobber.decksave.metainfo.xml
      - type: file
        path: 32x32.png
      - type: file
        path: 64x64.png
      - type: file
        path: 128x128.png
